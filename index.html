<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瑜伽课程报名</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container { width: 100%; max-width: 600px; }

  .header {
    text-align: center;
    margin-bottom: 24px;
    color: #fff;
  }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 14px; opacity: 0.8; margin-top: 6px; }

  .form-section {
    background: #fff;
    border-radius: 18px;
    padding: 20px 24px;
    margin-bottom: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .form-section h2 {
    font-size: 16px;
    color: #333;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #f0f0f0;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: #666;
  }
  .form-group input[type="text"],
  .form-group input[type="tel"] {
    padding: 10px 14px;
    border: 2px solid #e8e8e8;
    border-radius: 10px;
    font-size: 15px;
    color: #333;
    outline: none;
    transition: border-color 0.2s;
    background: #fafafa;
  }
  .form-group input:focus {
    border-color: #667eea;
    background: #fff;
  }
  .form-group input::placeholder { color: #bbb; }
  .form-group input.invalid {
    border-color: #e74c3c;
    background: #fff5f5;
  }

  .radio-group {
    display: flex;
    gap: 16px;
    padding-top: 4px;
  }
  .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 500;
    color: #555;
    cursor: pointer;
  }
  .radio-group input[type="radio"] {
    accent-color: #667eea;
    width: 16px; height: 16px;
  }

  .cards { display: flex; flex-direction: column; gap: 14px; }

  .card {
    background: #fff;
    border-radius: 18px;
    padding: 20px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.18); }
  .card.full { opacity: 0.45; }
  .card.full:hover { transform: none; }
  .card.updating { opacity: 0.7; pointer-events: none; }
  .card.selected { border: 2px solid #667eea; }

  .submit-section {
    background: #fff;
    border-radius: 18px;
    padding: 20px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    margin-top: 18px;
    text-align: center;
  }
  .submit-section .selected-list {
    font-size: 14px;
    color: #666;
    margin-bottom: 16px;
    line-height: 1.8;
  }
  .submit-section .selected-list .item {
    display: inline-block;
    background: #f0e6ff;
    color: #667eea;
    padding: 4px 12px;
    border-radius: 12px;
    margin: 4px;
    font-weight: 600;
  }

  .submit-btn {
    padding: 14px 32px;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transition: transform 0.15s, opacity 0.2s;
    width: 100%;
  }
  .submit-btn:active { transform: scale(0.96); }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }

  .confirm-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .confirm-modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 30px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .confirm-modal-box h3 {
    font-size: 20px;
    color: #333;
    margin-bottom: 16px;
  }
  .confirm-modal-box .modal-list {
    font-size: 15px;
    color: #555;
    margin-bottom: 20px;
    line-height: 2;
  }
  .confirm-modal-box .modal-person {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }
  .confirm-modal-box .modal-btns {
    display: flex;
    gap: 12px;
  }
  .confirm-modal-box .modal-btns button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .modal-cancel { background: #f0f0f0; color: #555; }
  .modal-confirm { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 20px;
    font-weight: 700;
    color: #333;
  }
  .card-title .icon {
    display: inline-block;
    width: 34px; height: 34px;
    line-height: 34px; text-align: center;
    border-radius: 10px;
    margin-right: 10px;
    font-size: 16px; color: #fff;
  }

  .card-count {
    font-size: 26px;
    font-weight: 800;
    color: #555;
  }
  .card-count.at-max .current { color: #e74c3c; }
  .card-count .sep { font-weight: 400; margin: 0 2px; color: #ccc; }

  .progress-wrap {
    height: 8px;
    background: #eee;
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .people-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    min-height: 24px;
  }
  .people-tag {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    color: #555;
    animation: tagIn 0.3s ease;
  }
  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }
  .no-select { color: #bbb; font-size: 13px; line-height: 24px; }

  .already-registered {
    background: #fff;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    text-align: center;
    margin-bottom: 18px;
  }
  .already-registered .icon-big {
    font-size: 48px;
    color: #27ae60;
    margin-bottom: 12px;
  }
  .already-registered h3 {
    font-size: 18px;
    color: #333;
    margin-bottom: 8px;
  }
  .already-registered p {
    font-size: 14px;
    color: #666;
  }
  .already-registered .course-list {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .already-registered .course-tag {
    background: #f0e6ff;
    color: #667eea;
    padding: 6px 14px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
  }

  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
    width: 100%;
    color: #fff;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.6; }

  .sync-indicator {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.3);
    padding: 4px 10px;
    border-radius: 10px;
  }

  .toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    z-index: 999;
    animation: slideDown 0.3s ease;
    pointer-events: none;
  }
  .toast.error { background: #e74c3c; }
  .toast.success { background: #27ae60; }
  .toast.info { background: #3498db; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  @media (max-width: 500px) {
    .form-grid { grid-template-columns: 1fr; }
    .card-title { font-size: 17px; }
    .card-count { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>瑜伽课程报名</h1>
    <p>请填写报名信息，然后选择课程（可多选）</p>
  </div>

  <div class="form-section">
    <h2>报名信息</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>姓名 <span style="color:#e74c3c;">*</span></label>
        <input type="text" id="nameInput" placeholder="请输入姓名" maxlength="20">
      </div>
      <div class="form-group">
        <label>性别 <span style="color:#e74c3c;">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="男"> 男</label>
          <label><input type="radio" name="gender" value="女"> 女</label>
        </div>
      </div>
      <div class="form-group">
        <label>公司 <span style="color:#e74c3c;">*</span></label>
        <input type="text" id="companyInput" placeholder="请输入公司名称" maxlength="50">
      </div>
      <div class="form-group">
        <label>电话 <span style="color:#e74c3c;">*</span></label>
        <input type="tel" id="phoneInput" placeholder="请输入11位手机号" maxlength="11" pattern="[0-9]*" inputmode="numeric">
      </div>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="submit-section" id="submitSection">
    <div class="selected-list" id="selectedList">尚未选择任何课程</div>
    <button class="submit-btn" id="submitBtn" disabled>确认提交</button>
  </div>
</div>

<div class="sync-indicator" id="syncIndicator" style="display:none;">同步中...</div>

<script>
  var API_BASE = '/api/data';

  var POLL_INTERVAL = 5000;

  var CARD_THEMES = [
    { btn: 'linear-gradient(135deg, #f093fb, #f5576c)', bar: 'linear-gradient(90deg, #f093fb, #f5576c)', icon: 'linear-gradient(135deg, #f093fb, #f5576c)', tagBg: '#fef0f0' },
    { btn: 'linear-gradient(135deg, #4facfe, #00f2fe)', bar: 'linear-gradient(90deg, #4facfe, #00f2fe)', icon: 'linear-gradient(135deg, #4facfe, #00f2fe)', tagBg: '#e8f4fd' },
    { btn: 'linear-gradient(135deg, #43e97b, #38f9d7)', bar: 'linear-gradient(90deg, #43e97b, #38f9d7)', icon: 'linear-gradient(135deg, #43e97b, #38f9d7)', tagBg: '#e6f9f0' },
    { btn: 'linear-gradient(135deg, #fa709a, #fee140)', bar: 'linear-gradient(90deg, #fa709a, #fee140)', icon: 'linear-gradient(135deg, #fa709a, #fee140)', tagBg: '#fff5f5' },
    { btn: 'linear-gradient(135deg, #a18cd1, #fbc2eb)', bar: 'linear-gradient(90deg, #a18cd1, #fbc2eb)', icon: 'linear-gradient(135deg, #a18cd1, #fbc2eb)', tagBg: '#f8f4ff' },
    { btn: 'linear-gradient(135deg, #fccb90, #d57eeb)', bar: 'linear-gradient(90deg, #fccb90, #d57eeb)', icon: 'linear-gradient(135deg, #fccb90, #d57eeb)', tagBg: '#fef5ff' },
    { btn: 'linear-gradient(135deg, #e0c3fc, #8ec5fc)', bar: 'linear-gradient(90deg, #e0c3fc, #8ec5fc)', icon: 'linear-gradient(135deg, #e0c3fc, #8ec5fc)', tagBg: '#f0f5ff' },
    { btn: 'linear-gradient(135deg, #f9d423, #ff4e50)', bar: 'linear-gradient(90deg, #f9d423, #ff4e50)', icon: 'linear-gradient(135deg, #f9d423, #ff4e50)', tagBg: '#fff8f0' },
  ];

  var DEFAULT_OPTIONS = [
    { id: 'A', label: '瑜伽课程 A', capacity: 8, selected: [] },
    { id: 'B', label: '瑜伽课程 B', capacity: 8, selected: [] },
    { id: 'C', label: '瑜伽课程 C', capacity: 8, selected: [] },
  ];

  var options = [];
  var isRequesting = false;
  var localSelected = {}; // locally selected option ids, not yet submitted
  var myPhone = localStorage.getItem('kecheng_phone') || ''; // remember submitted phone
  var alreadyRegistered = false; // flag: this phone already submitted

  function getPersonName(obj) {
    if (typeof obj === 'string') return obj;
    if (obj && typeof obj === 'object') return obj.name || '';
    return '';
  }

  function getPersonPhone(obj) {
    if (obj && typeof obj === 'object') return obj.phone || '';
    return '';
  }

  // Check if a phone number has already registered in any option
  function isPhoneRegistered(phone) {
    if (!phone) return false;
    return options.some(function(opt) {
      return opt.selected.some(function(p) { return getPersonPhone(p) === phone; });
    });
  }

  // Get which options a phone has registered for
  function getRegisteredOptions(phone) {
    return options.filter(function(opt) {
      return opt.selected.some(function(p) { return getPersonPhone(p) === phone; });
    });
  }

  // ===== Cloudflare Pages Functions API =====
  function apiGet() {
    return fetch(API_BASE).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function apiPost(data) {
    return fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: 'admin', options: data }),
    }).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function fetchData() {
    return apiGet().then(function(data) {
      options = data;
      // Check if saved phone already registered
      var phone = myPhone || document.getElementById('phoneInput').value.trim();
      alreadyRegistered = isPhoneRegistered(phone);
      // Auto-fill phone from localStorage if available
      if (myPhone && !document.getElementById('phoneInput').value.trim()) {
        document.getElementById('phoneInput').value = myPhone;
      }
      // sync localSelected with server state for current person
      var person = getCurrentPerson();
      if (person.phone && isPhoneRegistered(person.phone)) {
        alreadyRegistered = true;
        myPhone = person.phone;
        options.forEach(function(opt) {
          var isOnServer = opt.selected.some(function(p) { return getPersonPhone(p) === person.phone; });
          if (isOnServer) {
            localSelected[opt.id] = true;
          }
        });
      }
      render();
    }).catch(function(e) {
      console.error('获取数据失败:', e);
    });
  }

  function saveData(callback) {
    apiPost(options).then(function(data) {
      options = data;
      render();
      if (callback) callback(true);
    }).catch(function(e) {
      showToast('网络错误，请重试', 'error');
      fetchData();
      if (callback) callback(false);
    });
  }

  function getCurrentPerson() {
    var name = document.getElementById('nameInput').value.trim();
    var gender = document.querySelector('input[name="gender"]:checked');
    var company = document.getElementById('companyInput').value.trim();
    var phone = document.getElementById('phoneInput').value.trim();
    return {
      name: name,
      gender: gender ? gender.value : '',
      company: company,
      phone: phone
    };
  }

  function validateForm() {
    var person = getCurrentPerson();
    if (!person.name) { showToast('请输入姓名', 'error'); return false; }
    if (!person.gender) { showToast('请选择性别', 'error'); return false; }
    if (!person.company) { showToast('请输入公司名称', 'error'); return false; }
    if (!person.phone) { showToast('请输入手机号码', 'error'); return false; }
    if (!/^\d{11}$/.test(person.phone)) { showToast('手机号必须是11位数字', 'error'); return false; }
    // Check phone duplicate
    if (isPhoneRegistered(person.phone) && !alreadyRegistered) {
      showToast('该手机号已报名，不可重复提交', 'error');
      alreadyRegistered = true;
      myPhone = person.phone;
      localStorage.setItem('kecheng_phone', person.phone);
      render();
      return false;
    }
    return true;
  }

  function render() {
    var cardsEl = document.getElementById('cards');
    cardsEl.innerHTML = '';

    var person = getCurrentPerson();
    var phone = person.phone || myPhone;

    // Real-time phone validation visual feedback
    var phoneInput = document.getElementById('phoneInput');
    if (phoneInput.value && !/^\d{11}$/.test(phoneInput.value)) {
      phoneInput.classList.add('invalid');
    } else {
      phoneInput.classList.remove('invalid');
    }

    // Dynamic check: if phone field changes, re-check registration
    if (phone && isPhoneRegistered(phone) && !alreadyRegistered) {
      alreadyRegistered = true;
      myPhone = phone;
      localStorage.setItem('kecheng_phone', phone);
    }

    // Show "already registered" banner if applicable
    var submitSection = document.getElementById('submitSection');
    if (alreadyRegistered && phone) {
      var regOpts = getRegisteredOptions(phone);
      // Find the person's info from server data
      var myInfo = null;
      options.forEach(function(opt) {
        opt.selected.forEach(function(p) {
          if (getPersonPhone(p) === phone) myInfo = p;
        });
      });
      cardsEl.innerHTML =
        '<div class="already-registered">' +
          '<div class="icon-big">✅</div>' +
          '<h3>您已成功报名</h3>' +
          '<p>手机号 ' + escHtml(phone) + ' 已完成报名，不可重复提交</p>' +
          (myInfo ? '<p style="margin-top:4px;">报名人：' + escHtml(myInfo.name) + ' | ' + escHtml(myInfo.gender) + ' | ' + escHtml(myInfo.company) + '</p>' : '') +
          '<div class="course-list">' +
            regOpts.map(function(o) { return '<span class="course-tag">' + escHtml(o.label) + '</span>'; }).join('') +
          '</div>' +
        '</div>';

      // Still show course cards but in view-only mode
      options.forEach(function(opt, idx) {
        var isFull = opt.selected.length >= opt.capacity;
        var pct = opt.capacity > 0 ? Math.min((opt.selected.length / opt.capacity) * 100, 100) : 100;
        var theme = CARD_THEMES[idx % CARD_THEMES.length];

        var peopleHtml = opt.selected.length === 0
          ? '<div class="no-select">暂无选择</div>'
          : opt.selected.map(function(p) {
              var n = getPersonName(p);
              return '<span class="people-tag" style="background:' + theme.tagBg + ';">' + escHtml(n) + '</span>';
            }).join('');

        var isMine = opt.selected.some(function(p) { return getPersonPhone(p) === phone; });

        cardsEl.innerHTML +=
          '<div class="card' + (isFull && !isMine ? ' full' : '') + '">' +
            '<div class="card-header">' +
              '<div class="card-title">' +
                '<span class="icon" style="background:' + theme.icon + ';">' + escHtml(opt.label.charAt(0)) + '</span>' + escHtml(opt.label) +
                (isMine ? '<span style="font-size:12px;color:#27ae60;margin-left:8px;">✓ 已报名</span>' : '') +
              '</div>' +
              '<div class="card-count' + (isFull ? ' at-max' : '') + '">' +
                '<span class="current">' + opt.selected.length + '</span><span class="sep"> / </span>' + opt.capacity +
              '</div>' +
            '</div>' +
            '<div class="progress-wrap"><div class="progress-bar" style="width:' + pct + '%;background:' + theme.bar + ';"></div></div>' +
            '<div class="people-tags">' + peopleHtml + '</div>' +
          '</div>';
      });

      // Keep the submit button visible but disabled, with a clear message
      submitSection.style.display = '';
      document.getElementById('selectedList').innerHTML = '您已成功报名，不可重复提交';
      var btnEl = document.getElementById('submitBtn');
      btnEl.disabled = true;
      btnEl.textContent = '已报名';
      return;
    }

    submitSection.style.display = '';

    options.forEach(function(opt, idx) {
      var isFull = opt.selected.length >= opt.capacity;
      var pct = opt.capacity > 0 ? Math.min((opt.selected.length / opt.capacity) * 100, 100) : 100;
      var theme = CARD_THEMES[idx % CARD_THEMES.length];

      var peopleHtml = opt.selected.length === 0
        ? '<div class="no-select">暂无选择</div>'
        : opt.selected.map(function(p) {
            var n = getPersonName(p);
            return '<span class="people-tag" style="background:' + theme.tagBg + ';">' + escHtml(n) + '</span>';
          }).join('');

      var isMeOnServer = person.phone && opt.selected.some(function(p) { return getPersonPhone(p) === person.phone; });
      var isMeLocallySelected = localSelected[opt.id] === true;
      var isMeSelected = isMeOnServer || isMeLocallySelected;
      var isFullForMe = isFull && !isMeSelected;

      var cardClass = 'card' + (isFullForMe ? ' full' : '') + (isRequesting ? ' updating' : '') + (isMeLocallySelected && !isMeOnServer ? ' selected' : '');

      cardsEl.innerHTML +=
        '<div class="' + cardClass + '">' +
          '<div class="card-header">' +
            '<div class="card-title">' +
              '<span class="icon" style="background:' + theme.icon + ';">' + escHtml(opt.label.charAt(0)) + '</span>' + escHtml(opt.label) +
              (isMeSelected ? '<span style="font-size:12px;color:#27ae60;margin-left:8px;">✓ 已选</span>' : '') +
            '</div>' +
            '<div class="card-count' + (isFull ? ' at-max' : '') + '">' +
              '<span class="current">' + opt.selected.length + '</span><span class="sep"> / </span>' + opt.capacity +
            '</div>' +
          '</div>' +
          '<div class="progress-wrap"><div class="progress-bar" style="width:' + pct + '%;background:' + theme.bar + ';"></div></div>' +
          '<div class="people-tags">' + peopleHtml + '</div>' +
          '<button class="btn" data-option="' + opt.id + '" style="background:' + theme.btn + ';" ' + (isFullForMe || isRequesting ? 'disabled' : '') + '>' +
            (isMeLocallySelected && !isMeOnServer ? '取消选择' : isFull ? '🔒 名额已满' : '👉 选择') +
          '</button>' +
        '</div>';
    });

    // Update submit section
    var selectedIds = Object.keys(localSelected).filter(function(k) { return localSelected[k] === true; });
    var selectedOpts = selectedIds.map(function(id) { return options.find(function(o) { return o.id === id; }); }).filter(Boolean);
    
    var listEl = document.getElementById('selectedList');
    var btnEl = document.getElementById('submitBtn');

    if (selectedOpts.length === 0) {
      listEl.innerHTML = '尚未选择任何课程';
      btnEl.disabled = true;
    } else {
      listEl.innerHTML = '已选择：' + selectedOpts.map(function(o) { return '<span class="item">' + escHtml(o.label) + '</span>'; }).join('');
      btnEl.disabled = isRequesting;
    }
  }

  function toggleLocalOption(optionId) {
    if (!validateForm()) return;

    // If already registered, block
    if (alreadyRegistered) {
      showToast('您已报名，不可重复选择', 'error');
      return;
    }

    var opt = options.find(function(o) { return o.id === optionId; });
    if (!opt) return;

    var person = getCurrentPerson();

    // Toggle local selection
    if (localSelected[optionId]) {
      localSelected[optionId] = false;
    } else {
      // Check capacity
      if (opt.selected.length >= opt.capacity) {
        showToast('名额已满', 'error');
        return;
      }
      localSelected[optionId] = true;
    }
    render();
  }

  function submitSelection() {
    if (alreadyRegistered) {
      showToast('您已报名，不可重复提交', 'error');
      return;
    }

    var person = getCurrentPerson();
    var selectedIds = Object.keys(localSelected).filter(function(k) { return localSelected[k] === true; });

    if (selectedIds.length === 0) {
      showToast('请先选择课程', 'info');
      return;
    }

    // Show confirmation modal
    var selectedLabels = selectedIds.map(function(id) {
      return options.find(function(o) { return o.id === id; }).label;
    });

    showModal(person, selectedLabels, function() {
      doSubmit(person, selectedIds);
    });
  }

  function showModal(person, labels, onConfirm) {
    var modal = document.createElement('div');
    modal.className = 'confirm-modal';
    modal.innerHTML =
      '<div class="confirm-modal-box">' +
        '<h3>确认提交</h3>' +
        '<div class="modal-list">' + labels.map(function(l) { return '✅ ' + escHtml(l); }).join('<br>') + '</div>' +
        '<div class="modal-person">报名人：' + escHtml(person.name) + ' | ' + escHtml(person.gender) + ' | ' + escHtml(person.company) + ' | ' + escHtml(person.phone) + '</div>' +
        '<div class="modal-btns">' +
          '<button class="modal-cancel" id="modalCancelBtn">取消</button>' +
          '<button class="modal-confirm" id="modalConfirmBtn">确认提交</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(modal);

    document.getElementById('modalCancelBtn').onclick = function() { modal.remove(); };
    document.getElementById('modalConfirmBtn').onclick = function() { modal.remove(); onConfirm(); };
  }

  function doSubmit(person, newIds) {
    if (isRequesting) return;

    // Double-check phone not already registered
    if (isPhoneRegistered(person.phone)) {
      showToast('该手机号已报名，不可重复提交', 'error');
      alreadyRegistered = true;
      myPhone = person.phone;
      localStorage.setItem('kecheng_phone', person.phone);
      render();
      return;
    }

    isRequesting = true;
    toggleSync(true);
    render();

    // Add person to selected options
    newIds.forEach(function(id) {
      var opt = options.find(function(o) { return o.id === id; });
      if (opt && opt.selected.length < opt.capacity) {
        opt.selected.push(person);
      }
    });

    saveData(function(ok) {
      isRequesting = false;
      toggleSync(false);
      if (ok) {
        // Save phone to localStorage
        myPhone = person.phone;
        alreadyRegistered = true;
        localStorage.setItem('kecheng_phone', person.phone);
        var labels = newIds.map(function(id) { return options.find(function(o) { return o.id === id; }).label; });
        showToast('成功报名：' + labels.join(', '), 'success');
        render();
      }
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  var toastTimer;
  function showToast(msg, type) {
    var el = document.querySelector('.toast');
    if (el) el.remove();
    clearTimeout(toastTimer);
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    document.body.appendChild(t);
    toastTimer = setTimeout(function() { t.remove(); }, 2000);
  }

  function toggleSync(on) {
    document.getElementById('syncIndicator').style.display = on ? 'block' : 'none';
  }

  document.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-option]');
    if (btn && !btn.disabled) toggleLocalOption(btn.dataset.option);
    if (e.target.closest('#submitBtn') && !e.target.closest('#submitBtn').disabled) submitSelection();
  });

  // Phone input: only allow digits, auto-filter non-numeric characters
  document.getElementById('phoneInput').addEventListener('input', function(e) {
    e.target.value = e.target.value.replace(/\D/g, '');
    render();
  });

  ['nameInput', 'companyInput'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', render);
  });
  document.querySelectorAll('input[name="gender"]').forEach(function(r) {
    r.addEventListener('change', render);
  });

  // ===== Initialize =====
  fetchData().then(function() {
    setInterval(fetchData, POLL_INTERVAL);
  });
</script>
</body>
</html>
